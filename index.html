<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OPIDE</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      html, body {
        height: 100%;
        width: 100%;
        overflow: hidden;
        background: #1e1e1e;
      }

      /* Outer shell — full viewport, vertical flex */
      #workbench-shell {
        display: flex;
        flex-direction: column;
        height: 100vh;
        width: 100vw;
        overflow: hidden;
      }

      /* Title bar — hidden; using native Tauri window decorations */
      #workbench-titlebar {
        display: none;
      }

      /* Main content row: activitybar | sidebar | editor+panel stack */
      #workbench-main {
        display: flex;
        flex: 1;
        overflow: hidden;
        min-height: 0;
      }

      /* Activity bar — narrow icon column on the left */
      #workbench-activitybar {
        width: 48px;
        flex-shrink: 0;
        overflow: hidden;
      }

      /* Sidebar — collapsible pane next to activity bar */
      #workbench-sidebar {
        width: 300px;
        flex-shrink: 0;
        overflow: hidden;
      }

      /* Editor + panel take the remaining space, stacked vertically */
      #workbench-center {
        display: flex;
        flex-direction: column;
        flex: 1;
        overflow: hidden;
        min-width: 0;
      }

      /* Editor area — fills most of center column */
      #workbench-editor {
        flex: 1;
        overflow: hidden;
        min-height: 0;
      }

      /* Panel — terminal/problems/output at bottom of center column */
      #workbench-panel {
        height: 250px;
        flex-shrink: 0;
        overflow: hidden;
      }

      /* Status bar — full-width bar at the very bottom */
      #workbench-statusbar {
        height: 22px;
        flex-shrink: 0;
        overflow: hidden;
      }

      /* Loading screen while workbench boots */
      #workbench-loading {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #1e1e1e;
        color: #cccccc;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        font-size: 14px;
        z-index: 9999;
        transition: opacity 0.3s ease;
      }

      #workbench-loading.hidden {
        opacity: 0;
        pointer-events: none;
      }

      .loading-inner {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 16px;
      }

      .loading-logo {
        width: 520px;
        height: 260px;
        background: url('/opide-logo.png') center/contain no-repeat;
      }

      .loading-spinner {
        width: 24px;
        height: 24px;
        border: 2px solid rgba(255,255,255,0.1);
        border-top-color: #E8B931;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }

      @keyframes spin {
        to { transform: rotate(360deg); }
      }
    </style>
  </head>
  <body>

    <!-- Loading screen while workbench boots -->
    <div id="workbench-loading">
      <div class="loading-inner">
        <div class="loading-logo"></div>
        <div class="loading-spinner"></div>
      </div>
    </div>

    <!-- VS Code workbench shell — getWorkbenchServiceOverride manages layout internally -->
    <div id="workbench-shell"></div>

    <script type="module" src="/src/main.ts"></script>

    <!-- Branding and theme overrides are in src/global.css -->
  </body>
</html>
